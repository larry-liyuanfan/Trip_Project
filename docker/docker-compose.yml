services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: ota-multimodal-api
    ports:
      - "8000:8000"
    environment:
      VLLM_BASE_URL: "http://vllm:8000"
      VLLM_MODEL_NAME: "Qwen/Qwen2-VL-2B-Instruct"
    volumes:
      - ../data:/app/data
      - ../experiments:/app/experiments
    depends_on:
      - vllm

  vllm:
    image: vllm/vllm-openai:v0.8.5
    container_name: ota-vllm-server
    ports:
      - "8001:8000"
    environment:
      HF_HOME: /models/huggingface
      HF_HUB_DISABLE_XET: "1"
      VLLM_USE_V1: "0"
    volumes:
      - ../models:/models
    command:
      - --model
      - Qwen/Qwen2-VL-2B-Instruct
      - --served-model-name
      - Qwen/Qwen2-VL-2B-Instruct
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.75"
      - --enforce-eager
      - --limit-mm-per-prompt
      - '{"image":2,"video":0}'
      - --mm-processor-kwargs
      - '{"min_pixels":3136,"max_pixels":262144}'
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
