paths:
  business_json: data/yelp/raw/yelp_academic_dataset_business.json
  review_json: data/yelp/raw/yelp_academic_dataset_review.json
  photo_json: data/yelp/raw/photos.json
  image_root: data/yelp/raw/photos
  interim_dir: data/yelp/interim
  processed_dir: data/yelp/processed
  logs_dir: data/yelp/logs
  validation_dir: data/yelp/validation
  report_path: reports/yelp_multimodal_data_processing_report_part1.md
output:
  format: parquet
  chunk_size: 50000
image_validation:
  # Each batch is bounded before thread workers open and decode local images.
  workers: 16
  batch_size: 512
review_filters:
  min_text_length: 20
  reject_symbol_only: true
processing_limits:
  max_businesses: null
  max_reviews: null
  max_photos: null
weak_alignment:
  max_reviews_per_business: 5
  max_images_per_business: 5
clip_denoising:
  # Full CLIP inference is executed by the dedicated GPU Docker task, not the
  # native Windows data environment used for parsing and alignment.
  enabled: true
  threshold: 0.25
  model_id: openai/clip-vit-base-patch32
  device: cuda
  candidate_batch_size: 256
  image_batch_size: 32
  text_batch_size: 128
  output_filename: weak_pairs_denoised
